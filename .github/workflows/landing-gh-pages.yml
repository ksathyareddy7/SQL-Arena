name: Deploy landing to gh-pages

on:
  push:
    branches: ["main"]
    paths:
      - "landing/**"
      - ".github/workflows/landing-gh-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: landing-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish landing to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing
          publish_branch: gh-pages
          force_orphan: true

